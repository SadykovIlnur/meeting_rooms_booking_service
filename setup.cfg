[flake8]
ignore =
    W503
exclude =
    tests/,
    migrations/,
    data/
    venv/,
    env/,
    docs/,
    frontend/,
per-file-ignores =
    */settings.py:E501

[isort]
src_paths=app, tests
line_length=79
multi_line_output=3
include_trailing_comma=True
force_grid_wrap=0
use_parentheses=True
skip_glob =
    venv*,
    .*,
    */migrations